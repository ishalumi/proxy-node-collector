name: Fetch Nodes

"on":
  push:
    tags:
      - '*'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download GeoIP DB
        run: wget -qO GeoLite2-Country.mmdb "https://github.com/Loyalsoldier/geoip/releases/latest/download/Country.mmdb"

      - name: Fetch nodes
        run: python fetch.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
